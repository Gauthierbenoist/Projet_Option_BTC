# Pipeline Deribit BTC options — exécution quotidienne sur GitHub (PC éteint)
name: Deribit BTC Options Daily

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: deribit-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline
        id: etl
        run: python data/scripts/run_daily_pipeline.py --scheduled
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deribit-btc-options-${{ github.run_id }}
          path: |
            data/raw/**/*.json
            data/cleaned/*.csv
            data/logs/last_run.json
          retention-days: 90
          if-no-files-found: warn

      - name: Commit snapshots to repository
        id: commit
        continue-on-error: true
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): snapshot Deribit BTC options $(date -u +%Y-%m-%d)"
          file_pattern: "data/raw/* data/cleaned/* data/logs/last_run.json"
          branch: main
          push_options: "--force-with-lease"

      - name: Résumé
        if: always()
        run: |
          echo "ETL: ${{ steps.etl.outcome }}"
          echo "Commit: ${{ steps.commit.outcome }}"
          test "${{ steps.etl.outcome }}" = "success"
