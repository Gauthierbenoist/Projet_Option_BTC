# Pipeline Deribit BTC options — exécution quotidienne sur GitHub (PC éteint)
name: Deribit BTC Options Daily

on:
  schedule:
    # 00:15 UTC chaque jour (après roll Deribit)
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: deribit-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python data/scripts/run_daily_pipeline.py --scheduled
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE: require

      - name: Upload artifacts (backup téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: deribit-btc-options-${{ github.run_id }}
          path: |
            data/raw/**/*.json
            data/cleaned/*.csv
            data/logs/last_run.json
          retention-days: 90
          if-no-files-found: warn

      - name: Commit snapshots to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): snapshot Deribit BTC options ${{ github.run_id }}"
          file_pattern: |
            data/raw/**
            data/cleaned/**
            data/logs/last_run.json
          branch: main
